<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750">
  <title>恒讯供应链 — 微信名片</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
      display:flex;justify-content:center;align-items:center;
      min-height:100vh;
      background:#e8ecf1;
    }
    .card{
      width:640px;
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 8px 36px rgba(0,0,0,0.12);
    }
    /* Top banner */
    .card-top{
      background:linear-gradient(135deg,#1e3a5f,#2a4a6b);
      padding:20px 30px;
      display:flex;align-items:center;gap:14px;
    }
    .card-top img{
      height:60px;width:auto;
      border-radius:8px;
      background:#fff;
      padding:4px;
    }
    .card-top .top-text{
      color:#fff;
    }
    .card-top .top-text h3{
      font-size:17px;font-weight:700;
      letter-spacing:1px;
      margin-bottom:2px;
    }
    .card-top .top-text p{
      font-size:11px;opacity:0.65;
    }

    /* Body */
    .card-body{
      padding:24px 30px;
      display:flex;gap:24px;
    }
    .card-body .left{
      flex:1;
    }
    .card-body .name{
      font-size:26px;font-weight:700;
      color:#1a202c;
      margin-bottom:4px;
    }
    .card-body .role{
      display:inline-block;
      font-size:13px;color:#1e3a5f;
      background:#edf2f7;
      padding:2px 10px;border-radius:4px;
      margin-bottom:16px;
    }
    .card-body .services{
      display:flex;flex-wrap:wrap;gap:6px;
      margin-bottom:16px;
    }
    .card-body .tag{
      font-size:11px;
      background:#fefcbf;
      color:#975a16;
      padding:3px 10px;
      border-radius:12px;
      font-weight:500;
    }
    .card-body .contact-row{
      display:flex;flex-direction:column;gap:8px;
    }
    .card-body .contact-row span{
      font-size:13px;color:#4a5568;
    }
    .card-body .website{
      margin-top:12px;
      font-size:13px;font-weight:600;
      color:#3182ce;
      letter-spacing:0.5px;
    }

    /* QR */
    .card-body .right{
      flex-shrink:0;
      text-align:center;
    }
    .card-body .right img{
      width:120px;height:120px;
      border-radius:8px;
      border:2px solid #e2e8f0;
    }
    .card-body .right p{
      font-size:10px;color:#a0aec0;
      margin-top:5px;
    }

    /* Footer */
    .card-footer{
      background:#f7fafc;
      padding:14px 30px;
      text-align:center;
      font-size:11px;color:#a0aec0;
      border-top:1px solid #edf2f7;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <img src="logo.jpg" alt="Everquick">
    <div class="top-text">
      <h3>广东恒讯供应链管理有限公司</h3>
      <p>Everquick Supply-Chain Management (Guangdong) Co., Ltd.</p>
    </div>
  </div>

  <div class="card-body">
    <div class="left">
      <div class="name">邓毅辉</div>
      <div class="role">经理</div>
      <div class="services">
        <span class="tag">🌿 干海藻</span>
        <span class="tag">🪵 木材</span>
        <span class="tag">🧊 冻品</span>
        <span class="tag">🌐 全球采购</span>
      </div>
      <div class="contact-row">
        <span>📞 0086-13702274595</span>
        <span>✉️ tasmendeng@hotmail.com</span>
        <span>📍 广东省江门市东华一路19号602室</span>
      </div>
      <div class="website">www.everquick.cn</div>
    </div>
    <div class="right">
      <img src="qr.jpg" alt="微信二维码">
      <p>扫一扫 加微信</p>
    </div>
  </div>

  <div class="card-footer">
    专注干海藻 · 木材 · 冻品进口清关 / 贸易 / 全球采购
  </div>
</div>

</body>
</html>
