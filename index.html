<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Everquick Supply-Chain Management (Guangdong) Co., Ltd. — 广东恒讯供应链管理有限公司">
  <title>Everquick 恒讯供应链</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2a4a6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .splash {
      text-align: center;
      padding: 40px;
    }
    .splash img {
      height: 250px;
      margin-bottom: 24px;
    }
    .splash h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .splash h2 {
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    .lang-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lang-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 40px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 600;
      transition: all 0.25s ease;
      min-width: 160px;
    }
    .lang-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    .lang-btn small {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.7;
    }
  </style>
  <script>
    (function(){
      var TRACKING_URL = 'PLACEHOLDER_REPLACE_AFTER_DEPLOY';

      function sendVisit(geo) {
        if (!TRACKING_URL || TRACKING_URL.indexOf('PLACEHOLDER') !== -1) return;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('POST', TRACKING_URL, true);
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.send(JSON.stringify({
            ip: (geo && geo.ip) || '',
            country: (geo && geo.country) || '',
            code: (geo && geo.countryCode) || '',
            city: (geo && geo.city) || '',
            page: location.pathname,
            referrer: document.referrer || '',
            ua: navigator.userAgent || '',
            lang: navigator.language || ''
          }));
        } catch(e) {}
      }

      var ua = navigator.userAgent;
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua) ||
                     (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
      if (isMobile) {
        sendVisit({});
        var lang = navigator.language || '';
        if (lang.indexOf('zh') === 0) {
          location.replace('mobile/cn.html');
        } else {
          location.replace('mobile/en.html');
        }
        return;
      }

      // 桌面端：IP 地理位置自动跳转
      var OVERRIDE_KEY = 'everquick_lang_override';

      // 如果用户带了 ?manual 参数，显示选择页，不自动跳转
      if (location.search.indexOf('manual') !== -1) {
        sendVisit({});
        return;
      }

      // 如果用户之前手动选过语言，直接跳转
      var langOverride = localStorage.getItem(OVERRIDE_KEY);
      if (langOverride === 'cn') {
        sendVisit({});
        location.replace('cn/index.html');
        return;
      }
      if (langOverride === 'en') {
        sendVisit({});
        location.replace('en/index.html');
        return;
      }

      // 调用 IP 地理位置 API 自动判断
      fetch('https://geolocation-db.com/json/')
        .then(function(res){ return res.json(); })
        .then(function(data){
          var geo = {
            ip: data.IPv4,
            country: data.country_name,
            countryCode: data.country_code,
            city: data.city || ''
          };
          sendVisit(geo);
          if (data.country_code === 'CN') {
            location.replace('cn/index.html');
          } else if (data.country_code) {
            location.replace('en/index.html');
          }
        })
        .catch(function(){
          sendVisit({});
        });
    })();

    // 用户点击语言按钮时记住偏好 + 发送追踪
    document.addEventListener('DOMContentLoaded', function(){
      var links = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function(e){
          var href = this.getAttribute('href');
          if (href.indexOf('cn/') !== -1) {
            localStorage.setItem('everquick_lang_override', 'cn');
          } else if (href.indexOf('en/') !== -1) {
            localStorage.setItem('everquick_lang_override', 'en');
          }
        });
      }
    });
  </script>
</head>
<body>
  <div class="splash">
    <img src="images/logo.jpg" alt="Everquick">
    <h1>广东恒讯供应链管理有限公司</h1>
    <h2>Everquick Supply-Chain Management (Guangdong) Co., Ltd.</h2>
    <div class="lang-buttons">
      <a href="cn/index.html" class="lang-btn">
        中文
        <small>简体中文</small>
      </a>
      <a href="en/index.html" class="lang-btn">
        EN
        <small>English</small>
      </a>
    </div>
  </div>
</body>
</html>
