<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Everquick Supply-Chain Management (Guangdong) Co., Ltd. — 广东恒讯供应链管理有限公司">
  <title>Everquick 恒讯供应链</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2a4a6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .splash {
      text-align: center;
      padding: 40px;
    }
    .splash img {
      height: 250px;
      margin-bottom: 24px;
    }
    .splash h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .splash h2 {
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    .lang-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lang-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 40px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 600;
      transition: all 0.25s ease;
      min-width: 160px;
    }
    .lang-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    .lang-btn small {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img src="images/logo.jpg" alt="Everquick">
    <h1>广东恒讯供应链管理有限公司</h1>
    <h2>Everquick Supply-Chain Management (Guangdong) Co., Ltd.</h2>
    <div class="lang-buttons">
      <a href="cn/index.html" class="lang-btn">
        中文
        <small>简体中文</small>
      </a>
      <a href="en/index.html" class="lang-btn">
        EN
        <small>English</small>
      </a>
    </div>
  </div>
</body>
</html>
